<div class="grid grid-cols-1 gap-8 lg:grid-cols-2">
  <form class="form-shell">
    <fieldset class="form-fieldset">
      <legend class="form-legend">Créer votre compte</legend>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Votre prénom *</label>
          <input id="txtPrenom" name="prenom" type="text" class="form-input" />
          <p class="form-error"></p>
        </div>

        <div class="form-group">
          <label class="form-label" >Votre nom *</label>
          <input id="txtNom" name="nom" type="text" class="form-input" />
          <p class="form-error"></p>
        </div>

        <div class="form-group md:col-span-2">
          <label class="form-label" >Votre email *</label>
          <input id="txtMail" name="email" type="email" class="form-input" />
          <p class="form-error"></p>
        </div>

        <div class="form-group md:col-span-2">
          <label class="form-label" >Votre mot de passe *</label>
          <input id="mdp" name="password" type="password" class="form-input" />
          <p class="form-error"></p>
        </div>

        <div class="md:col-span-2 flex justify-end">
          <button type="submit" class="btn-primary">Envoyer</button>
        </div>
      </div>
    </fieldset>
  </form>

  <form class="form-shell" novalidate>
    <fieldset class="form-fieldset">
      <legend class="form-legend">Créer votre compte</legend>

      <div class="form-grid">
        <div class="form-group">
          <label class="form-label" for="txtPrenom2">
            Votre prénom <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <input
            id="txtPrenom2"
            name="prenom"
            type="text"
            required
            aria-required="true"
            aria-describedby="error-prenom2"
            class="form-input"
          />
          <p id="error-prenom2" class="form-error" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label class="form-label" for="txtNom2">
            Votre nom <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <input
            id="txtNom2"
            name="nom"
            type="text"
            required
            aria-required="true"
            aria-describedby="error-nom2"
            class="form-input"
          />
          <p id="error-nom2" class="form-error" aria-live="polite"></p>
        </div>

        <div class="form-group md:col-span-2">
          <label class="form-label" for="txtMail2">
            Votre email <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <input
            id="txtMail2"
            name="email"
            type="email"
            required
            aria-required="true"
            aria-describedby="error-email2"
            autocomplete="email"
            class="form-input"
          />
          <p id="error-email2" class="form-error" aria-live="polite"></p>
        </div>

        <div class="form-group md:col-span-2">
          <label class="form-label" for="mdp2">
            Votre mot de passe <span aria-hidden="true" class="required-mark">*</span>
          </label>
          <input
            id="mdp2"
            name="password"
            type="password"
            required
            aria-required="true"
            aria-describedby="error-mdp2"
            autocomplete="new-password"
            class="form-input"
          />
          <p id="error-mdp2" class="form-error" aria-live="polite"></p>
        </div>

        <div class="md:col-span-2 flex justify-end">
          <button type="submit" class="btn-primary">Envoyer</button>
        </div>
      </div>
    </fieldset>
  </form>
</div>
