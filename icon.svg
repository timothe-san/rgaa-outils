<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fond -->
  <rect width="64" height="64" rx="14" fill="#2563eb"/>

  <!-- Corps de l’oiseau -->
  <path d="M26 36 Q32 28 38 36 Q32 40 26 36 Z"
        fill="#ffffff"/>

  <!-- Aile gauche (<) -->
  <path d="M24 32 L18 36 L24 40"
        stroke="#ffffff"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Aile droite (>) -->
  <path d="M40 32 L46 36 L40 40"
        stroke="#ffffff"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Double point (remplace la tête) -->
  <circle cx="29" cy="27" r="1.8" fill="#101828"/>
  <circle cx="35" cy="27" r="1.8" fill="#101828"/>
</svg>
